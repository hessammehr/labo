services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/labo.db
      - storage-data:/app/storage
    environment:
      - LABO_DATABASE_URL=sqlite:///./labo.db
      - LABO_JWT_SECRET=${LABO_JWT_SECRET:-change-me-in-production}
      - LABO_STORAGE_DIR=/app/storage

volumes:
  db-data:
  storage-data:
